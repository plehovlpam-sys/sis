<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Font Inspector</title>
    <style>
        * { margin: 0; padding: 0; background: #111; }
        body { padding: 20px; }
        canvas { 
            border: 1px solid #333; 
            image-rendering: pixelated;
            margin: 5px;
        }
        .info {
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
        }
        .legend {
            color: #888;
            font-family: monospace;
            font-size: 12px;
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 2px;
            max-width: 800px;
            margin: 10px 0;
        }
        .legend span { text-align: center; padding: 2px; border: 1px solid #222; }
    </style>
</head>
<body>
    <div class="info" id="info">Loading...</div>
    <canvas id="fontPreview"></canvas>
    <canvas id="charTest" width="960" height="300"></canvas>

    <script>
        const fontImage = new Image();
        fontImage.src = '12x22.png';

        const CHAR_W = 12;
        const CHAR_H = 22;
        const COLS = 16;

        // Все 95 печатных ASCII символов (0x20 - 0x7E)
        const allChars = ' !"#$%&\'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~';

        fontImage.onload = function() {
            document.getElementById('info').innerHTML = 
                `✅ Font loaded: ${fontImage.width}×${fontImage.height}px<br>` +
                `Expected: 1152×44px (96 chars × 12px = 1152, 2 rows × 22px = 44)<br>` +
                `If size differs, we need to adjust!`;

            // Показываем саму картинку
            const preview = document.getElementById('fontPreview');
            preview.width = fontImage.width;
            preview.height = fontImage.height;
            const pctx = preview.getContext('2d');
            pctx.drawImage(fontImage, 0, 0);

            // Пробуем вывести символы с их номерами
            const canvas = document.getElementById('charTest');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Выводим каждый символ с подписью
            for (let i = 0; i < allChars.length; i++) {
                const code = allChars.charCodeAt(i);
                const col = i % COLS;
                const row = Math.floor(i / COLS);

                // Позиция на картинке-шрифте
                const sx = col * CHAR_W;
                const sy = row * CHAR_H;

                // Позиция на тестовом холсте (4 ряда по 24 символа)
                const tx = (i % 24) * 40;
                const ty = Math.floor(i / 24) * 40;

                // Рисуем символ (жирный ряд для наглядности)
                ctx.drawImage(fontImage, sx, sy, CHAR_W, CHAR_H, tx + 4, ty + 4, CHAR_W, CHAR_H);

                // Подписываем ASCII код
                ctx.fillStyle = '#666';
                ctx.font = '8px monospace';
                ctx.fillText(code, tx + 6, ty + 32);

                // Подписываем сам символ
                ctx.fillStyle = '#0f0';
                ctx.font = '8px monospace';
                ctx.fillText(allChars[i], tx + 18, ty + 32);
            }

            // Анализируем: где лежит буква 'A'?
            const aIndex = allChars.indexOf('A'); // должно быть 33
            const aCol = aIndex % COLS;
            const aRow = Math.floor(aIndex / COLS);
            console.log(`=== DEBUG ===`);
            console.log(`Letter 'A' is at index ${aIndex}, col ${aCol}, row ${aRow}`);
            console.log(`Pixel coords on font: x=${aCol*CHAR_W}, y=${aRow*CHAR_H}`);
        };

        fontImage.onerror = function() {
            document.getElementById('info').innerHTML = '❌ Cannot load 12x22.png!';
        };
    </script>
</body>
</html>
