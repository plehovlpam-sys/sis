<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kindle Boot Log Emulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            background: #000;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        canvas {
            background: #000;
            border: 2px solid #333;
            border-radius: 4px;
            padding: 20px;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <canvas id="log"></canvas>

    <script>
        // =============================================
        // 1. ЗАГРУЗКА КАРТИНКИ
        // =============================================
        const fontImage = new Image();
        fontImage.src = '12x22.png';

        // Параметры шрифта (из размера картинки)
        const CHAR_W = 12;
        const CHAR_H = 22;
        const COLS_PER_ROW = 16; // 16 символов в ряду на картинке
        const TOTAL_CHARS = 96;  // Всего символов (0x20 до 0x7F)

        // Размер терминала: 80 колонок x 30 строк
        const TERM_COLS = 80;
        const TERM_ROWS = 30;

        const canvas = document.getElementById('log');
        canvas.width = TERM_COLS * CHAR_W;
        canvas.height = TERM_ROWS * CHAR_H;
        const ctx = canvas.getContext('2d');

        // =============================================
        // 2. ЛОГИ ДЛЯ ВЫВОДА
        // =============================================
        const logLines = [
            '*****************************************',
            '*         WELCOME TO KINDLE              *',
            '*   Linux 3.0.35-lab126 #1 SMP PREEMPT  *',
            '*   KINDLE REV: 10th Generation          *',
            '*   SYSTEM: MAIN (User partition)        *',
            '*   BATTERY: 98% (Charging)              *',
            '*   STORAGE: 2.1 GB free of 3.2 GB       *',
            '*****************************************',
            '',
            '[    0.000000] Booting Linux on physical CPU 0x0',
            '[    0.000000] Linux version 3.0.35-lab126 (lab126@sw027) (gcc version 4.5.1)',
            '[    0.000000] CPU: ARMv7 Processor [412fc09a] revision 10 (ARMv7)',
            '[    0.000000] Memory: 512MB = 512MB total',
            '[    0.390000] EXT3-fs (mmcblk0p1): mounted filesystem with writeback data mode',
            '[    4.230000] EPDC: 1st update marker - pre-initialization flash',
            '[    5.450000] input: framework_keypad as /devices/virtual/input/input0',
            '[    6.520000] Battery: 4.172 Volts, 31 Degrees C, Charging',
            '[    7.100000] wifi: firmware loaded successfully, link is UP',
            '[    8.000000] *** System ready ***',
            '',
            'Kindle startup complete. Happy reading!',
            '',
            'login[1890]: root login on \'ttyS0\''
        ];

        // =============================================
        // 3. ФУНКЦИЯ ОТРИСОВКИ СИМВОЛА
        // =============================================
        function drawChar(ctx, img, charCode, x, y, useBold) {
            // ASCII код должен быть в диапазоне 0x20-0x7E
            if (charCode < 0x20 || charCode > 0x7E) return;

            // Индекс символа в таблице (начинается с 0 для пробела)
            const index = charCode - 0x20;

            // Определяем ряд: 0 = обычный (верхний), 1 = жирный (нижний)
            const row = useBold ? 1 : 0;

            // Определяем колонку: от 0 до 15
            const col = index % COLS_PER_ROW;

            // Координаты на картинке-шрифте
            const sx = col * CHAR_W;
            const sy = row * CHAR_H;

            // Рисуем символ
            ctx.drawImage(
                img,
                sx, sy, CHAR_W, CHAR_H,  // откуда вырезать
                x, y, CHAR_W, CHAR_H     // куда вставить
            );
        }

        // =============================================
        // 4. ОСНОВНАЯ ФУНКЦИЯ ОТРИСОВКИ
        // =============================================
        function renderLog() {
            // Очищаем холст (чёрный фон)
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Проходим по всем строкам лога
            for (let row = 0; row < logLines.length && row < TERM_ROWS; row++) {
                const line = logLines[row];
                if (!line) continue;

                // Проходим по символам в строке
                for (let col = 0; col < line.length && col < TERM_COLS; col++) {
                    const code = line.charCodeAt(col);

                    // Проверяем, что символ есть в таблице (0x20-0x7E)
                    if (code >= 0x20 && code <= 0x7E) {
                        // ⚠️ ВАЖНО: определяем, использовать ли жирный шрифт
                        // В Android Recovery почти все символы — жирные (нижний ряд)
                        // Исключение: некоторые спецсимволы могут быть обычными
                        // Для реализма: делаем все символы жирными, кроме пробела
                        const bold = (code !== 0x20); // всё, кроме пробела — жирное

                        drawChar(
                            ctx,
                            fontImage,
                            code,
                            col * CHAR_W,
                            row * CHAR_H,
                            bold
                        );
                    }
                }
            }
        }

        // =============================================
        // 5. АНИМИРОВАННЫЙ ВАРИАНТ (ПОСТРОЧНЫЙ ВЫВОД)
        // =============================================
        let currentLine = 0;
        const lineDelay = 200; // мс между строками

        function renderNextLine() {
            if (currentLine >= logLines.length) {
                console.log('✅ Boot complete!');
                return;
            }

            // Очищаем холст
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рендерим все строки до текущей включительно
            for (let row = 0; row <= currentLine && row < TERM_ROWS; row++) {
                const line = logLines[row];
                if (!line) continue;

                for (let col = 0; col < line.length && col < TERM_COLS; col++) {
                    const code = line.charCodeAt(col);
                    if (code >= 0x20 && code <= 0x7E) {
                        // Все символы, кроме пробела — жирные (нижний ряд)
                        const bold = (code !== 0x20);
                        drawChar(
                            ctx,
                            fontImage,
                            code,
                            col * CHAR_W,
                            row * CHAR_H,
                            bold
                        );
                    }
                }
            }

            currentLine++;
            setTimeout(renderNextLine, lineDelay);
        }

        // =============================================
        // 6. ЗАПУСК
        // =============================================
        fontImage.onload = function() {
            console.log('✅ Font loaded! Size:', fontImage.width, 'x', fontImage.height);
            // renderLog(); // Мгновенный вывод (раскомментируйте, если не нужна анимация)
            renderNextLine(); // Построчный вывод с задержкой
        };

        fontImage.onerror = function() {
            console.error('❌ Failed to load 12x22.png!');
            ctx.fillStyle = '#0f0';
            ctx.font = '14px monospace';
            ctx.fillText('ERROR: 12x22.png not found!', 10, 30);
        };
    </script>
</body>
</html>
