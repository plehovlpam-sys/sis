<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kindle Boot</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #ffffff;
        }
        .screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            overflow: hidden;
        }
        .logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            user-select: none;
        }
        .logo img {
            display: block;
            max-width: 180px;
            height: auto;
        }
        #log {
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: transparent;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="screen">
    <div class="logo">
        <img src="logokindle.png" alt="Kindle">
    </div>
    <canvas id="log"></canvas>
</div>

<script>
    // ============================================================
    // 1. ЗАГРУЖАЕМ КАРТИНКУ
    // ============================================================
    const fontImage = new Image();
    fontImage.src = '12x22.png';

    const CHAR_W = 12;
    const CHAR_H = 22;
    const COLS = 16;

    // ============================================================
    // 2. КАРТА СИМВОЛОВ (ЖЁСТКО ЗАДАНА, КАК В РАБОЧЕМ ПРИМЕРЕ)
    // ============================================================
    // Все 95 печатных ASCII символов в правильном порядке
    const ASCII_CHARS = ' !"#$%&\'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~';
    
    // Строим карту: символ -> индекс на картинке
    // Предполагаем, что символы на картинке идут в ТОМ ЖЕ порядке, что и в ASCII
    function buildCharMap() {
        const totalRows = Math.floor(fontImage.height / CHAR_H);
        const totalCols = Math.floor(fontImage.width / CHAR_W);
        const totalChars = totalRows * totalCols;
        
        const map = {};
        for (let i = 0; i < totalChars && i < ASCII_CHARS.length; i++) {
            map[ASCII_CHARS[i]] = i;
        }
        return map;
    }

    let charMap = {};

    // ============================================================
    // 3. ЛОГИ
    // ============================================================
    const logLines = [
        '*****************************************',
        '*         WELCOME TO KINDLE              *',
        '*   Linux 3.0.35-lab126 #1 SMP PREEMPT  *',
        '*   KINDLE REV: 10th Generation          *',
        '*   SYSTEM: MAIN (User partition)        *',
        '*   BATTERY: 98% (Charging)              *',
        '*   STORAGE: 2.1 GB free of 3.2 GB       *',
        '*****************************************',
        '',
        '[    0.000000] Booting Linux on physical CPU 0x0',
        '[    0.000000] Linux version 3.0.35-lab126 (lab126@sw027)',
        '[    0.000000] CPU: ARMv7 Processor [412fc09a] revision 10',
        '[    0.000000] Memory: 512MB = 512MB total',
        '[    0.390000] EXT3-fs (mmcblk0p1): mounted filesystem',
        '[    4.230000] EPDC: 1st update marker - pre-initialization flash',
        '[    5.450000] input: framework_keypad as /devices/virtual/input/input0',
        '[    6.520000] Battery: 4.172 Volts, 31 Degrees C, Charging',
        '[    7.100000] wifi: firmware loaded successfully, link is UP',
        '[    8.000000] *** System ready ***',
        '',
        'Kindle startup complete. Happy reading!',
        '',
        'login[1890]: root login on \'ttyS0\''
    ];

    // ============================================================
    // 4. ОТРИСОВКА СИМВОЛА (ТОЧНО КАК В РАБОЧЕМ ПРИМЕРЕ)
    // ============================================================
    function drawChar(ctx, img, charCode, x, y) {
        const char = String.fromCharCode(charCode);
        
        // Ищем индекс символа в карте
        let foundIndex = charMap[char];
        if (foundIndex === undefined) {
            // Символ не найден — рисуем серый квадратик
            ctx.fillStyle = '#ccc';
            ctx.fillRect(x, y, CHAR_W, CHAR_H);
            return;
        }

        const totalCols = Math.floor(img.width / CHAR_W);
        const totalRows = Math.floor(img.height / CHAR_H);
        const totalChars = totalCols * totalRows;

        // Обычный ряд
        let col = foundIndex % totalCols;
        let row = Math.floor(foundIndex / totalCols);
        let sx = col * CHAR_W;
        let sy = row * CHAR_H;

        // Пытаемся взять жирный шрифт (сдвиг на 16 индексов вниз)
        const boldIndex = foundIndex + 16;
        if (boldIndex < totalChars) {
            const boldCol = boldIndex % totalCols;
            const boldRow = Math.floor(boldIndex / totalCols);
            sx = boldCol * CHAR_W;
            sy = boldRow * CHAR_H;
        }

        ctx.drawImage(img, sx, sy, CHAR_W, CHAR_H, x, y, CHAR_W, CHAR_H);
    }

    // ============================================================
    // 5. НАСТРОЙКИ КАНВАСА
    // ============================================================
    const TERM_COLS = 80;
    const TERM_ROWS = 30;

    const canvas = document.getElementById('log');
    const ctx = canvas.getContext('2d');

    // Размер канваса: 80×12 = 960px, 30×22 = 660px
    canvas.width = TERM_COLS * CHAR_W;
    canvas.height = TERM_ROWS * CHAR_H;

    // Позиционируем в левом верхнем углу
    canvas.style.position = 'absolute';
    canvas.style.top = '0';
    canvas.style.left = '0';

    // ============================================================
    // 6. АНИМИРОВАННЫЙ ВЫВОД ПОСТРОЧНО
    // ============================================================
    let currentLine = 0;
    const lineDelay = 40;

    function renderNextLine() {
        if (currentLine >= logLines.length) {
            console.log('✅ Boot complete!');
            return;
        }

        const line = logLines[currentLine];
        if (line) {
            for (let col = 0; col < line.length && col < TERM_COLS; col++) {
                const code = line.charCodeAt(col);
                if (code >= 0x20 && code <= 0x7E) {
                    drawChar(ctx, fontImage, code, col * CHAR_W, currentLine * CHAR_H);
                }
            }
        }
        currentLine++;

        if (currentLine < logLines.length) {
            setTimeout(renderNextLine, lineDelay);
        }
    }

    // ============================================================
    // 7. ЗАПУСК
    // ============================================================
    fontImage.onload = function() {
        charMap = buildCharMap();
        console.log('✅ Шрифт загружен, карта построена');
        console.log('Пробел -> индекс', charMap[' ']);
        console.log('A -> индекс', charMap['A']);
        console.log('a -> индекс', charMap['a']);
        
        // Очищаем канвас (прозрачный фон)
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        renderNextLine();
    };

    fontImage.onerror = function() {
        console.error('❌ 12x22.png не найден!');
        ctx.fillStyle = '#000';
        ctx.font = '14px monospace';
        ctx.fillText('ERROR: 12x22.png not found!', 10, 30);
    };

    // Если картинка уже загружена
    if (fontImage.complete && fontImage.naturalWidth > 0) {
        charMap = buildCharMap();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        renderNextLine();
    }

    // ============================================================
    // 8. ПЕРЕЗАПУСК ПО КЛИКУ
    // ============================================================
    document.addEventListener('click', function() {
        if (currentLine >= logLines.length) {
            currentLine = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            renderNextLine();
        }
    });
</script>
</body>
</html>
