<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindle Boot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            overflow: hidden;
            transition: background 0.05s ease;
        }
        .logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            user-select: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .logo.show {
            opacity: 1;
        }
        .logo img {
            display: block;
            max-width: 120px;
            height: auto;
        }
        .logo.big img {
            max-width: 160px;
        }
        #log {
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: transparent;
            z-index: 10;
            pointer-events: none;
            opacity: 1;
        }
        .tux {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            pointer-events: none;
            user-select: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .tux.show {
            opacity: 1;
        }
        .tux img {
            display: block;
            width: 64px;
            height: auto;
        }
        #videoContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            user-select: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #videoContainer.show {
            opacity: 1;
        }
        #bootVideo {
            display: block;
            max-width: 120px;
            height: auto;
            pointer-events: none;
        }
        #videoContainer.big #bootVideo {
            max-width: 160px;
        }
        #loadingIndicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-family: monospace;
            font-size: 12px;
            z-index: 20;
            opacity: 0.5;
            display: none;
        }
    </style>
</head>
<body>
<div class="screen" id="screen">
    <div id="loadingIndicator">Loading resources...</div>
    <div class="logo" id="logoContainer">
        <img src="logos/vidboot_do_logov.jpg" alt="Kindle" id="logoImg">
    </div>
    <div id="videoContainer">
        <video id="bootVideo" muted playsinline loop>
            <source src="logos/vidboot.mp4" type="video/mp4">
        </video>
    </div>
    <div class="tux" id="tuxContainer">
        <img src="tux.png" alt="Tux">
    </div>
    <canvas id="log"></canvas>
</div>

<script>
    // ============================================================
    // 0. ПРЕДЗАГРУЗКА РЕСУРСОВ В LOCALSTORAGE
    // ============================================================
    const RESOURCES = [
        { name: '12x22.png', url: '12x22.png', type: 'image' },
        { name: 'biosimitation.png', url: 'biosimitation.png', type: 'image' },
        { name: 'biosimitationpt2.png', url: 'biosimitationpt2.png', type: 'image' },
        { name: 'tux.png', url: 'tux.png', type: 'image' },
        { name: 'vidboot_do_logov.jpg', url: 'logos/vidboot_do_logov.jpg', type: 'image' },
        { name: 'vidboot.mp4', url: 'logos/vidboot.mp4', type: 'video' }
    ];

    const STORAGE_KEY = 'kindle_boot_cache';

    async function preloadResources() {
        const loadingIndicator = document.getElementById('loadingIndicator');
        loadingIndicator.style.display = 'block';

        // Проверяем, есть ли уже закешированные ресурсы
        const cached = localStorage.getItem(STORAGE_KEY);
        const cacheMap = cached ? JSON.parse(cached) : {};

        for (const resource of RESOURCES) {
            // Если ресурс уже есть в кеше и не изменился — пропускаем
            if (cacheMap[resource.name]) {
                console.log(`✅ ${resource.name} уже в кеше`);
                continue;
            }

            try {
                console.log(`⏳ Загрузка ${resource.name}...`);
                const response = await fetch(resource.url);
                const blob = await response.blob();
                
                // Конвертируем в base64 для хранения в localStorage
                const reader = new FileReader();
                const data = await new Promise((resolve) => {
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });

                cacheMap[resource.name] = {
                    data: data,
                    type: resource.type,
                    size: blob.size,
                    timestamp: Date.now()
                };

                console.log(`✅ ${resource.name} загружен (${(blob.size / 1024).toFixed(1)} KB)`);
            } catch (e) {
                console.warn(`⚠️ Не удалось загрузить ${resource.name}:`, e);
            }
        }

        // Сохраняем в localStorage
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cacheMap));
            console.log('💾 Все ресурсы сохранены в localStorage');
        } catch (e) {
            console.warn('⚠️ Не удалось сохранить в localStorage (возможно, превышен лимит):', e);
        }

        loadingIndicator.style.display = 'none';
        return cacheMap;
    }

    // Функция для получения ресурса из кеша или с сервера
    function getResourceUrl(name) {
        const cached = localStorage.getItem(STORAGE_KEY);
        if (cached) {
            const cacheMap = JSON.parse(cached);
            if (cacheMap[name]) {
                return cacheMap[name].data;
            }
        }
        // Если в кеше нет — возвращаем оригинальный URL
        const resource = RESOURCES.find(r => r.name === name);
        return resource ? resource.url : null;
    }

    // ============================================================
    // 1. ЗАГРУЖАЕМ КАРТИНКУ
    // ============================================================
    let fontImage = new Image();

    const CHAR_W = 12;
    const CHAR_H = 22;
    const COLS = 16;

    let charMap = {};

    // ============================================================
    // 2. ЛОГИ
    // ============================================================
    const logLines = [
        '*****************************************',
        '*         WELCOME TO KINDLE              *',
        '*   Linux 3.0.35-lab126 #1 SMP PREEMPT  *',
        '*   KINDLE REV: 10th Generation          *',
        '*   SYSTEM: MAIN (User partition)        *',
        '*   BATTERY: 98% (Charging)              *',
        '*   STORAGE: 2.1 GB free of 3.2 GB       *',
        '*****************************************',
        '',
        '[    0.000000] Booting Linux on physical CPU 0x0',
        '[    0.000000] Linux version 3.0.35-lab126 (lab126@sw027)',
        '[    0.000000] CPU: ARMv7 Processor [412fc09a] revision 10',
        '[    0.000000] Memory: 512MB = 512MB total',
        '[    0.390000] EXT3-fs (mmcblk0p1): mounted filesystem',
        '[    4.230000] EPDC: 1st update marker - pre-initialization flash',
        '[    5.450000] input: framework_keypad as /devices/virtual/input/input0',
        '[    6.520000] Battery: 4.172 Volts, 31 Degrees C, Charging',
        '[    7.100000] wifi: firmware loaded successfully, link is UP',
        '[    8.000000] *** System ready ***',
        '',
        'Kindle startup complete. Happy reading!',
        '',
        'login[1890]: root login on \'ttyS0\''
    ];

    // Сообщение для Recovery
    const recoveryMessage = 'If you want to start recovery boot sector press volume + three times!!';

    // ============================================================
    // 3. ПОСТРОЕНИЕ КАРТЫ СИМВОЛОВ
    // ============================================================
    function buildCharMap() {
        const totalRows = Math.floor(fontImage.height / CHAR_H);
        const totalCols = Math.floor(fontImage.width / CHAR_W);
        const asciiChars = ' !"#$%&\'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~';
        
        for (let i = 0; i < totalCols * totalRows && i < asciiChars.length; i++) {
            charMap[i] = asciiChars[i];
        }
        for (let i = asciiChars.length; i < totalCols * totalRows; i++) {
            charMap[i] = '?';
        }
    }

    // ============================================================
    // 4. ОТРИСОВКА СИМВОЛА
    // ============================================================
    function drawChar(ctx, img, charCode, x, y) {
        let foundIndex = -1;
        for (let idx in charMap) {
            if (charMap[idx] === String.fromCharCode(charCode)) {
                foundIndex = parseInt(idx);
                break;
            }
        }

        if (foundIndex === -1) {
            ctx.fillStyle = '#333';
            ctx.fillRect(x, y, CHAR_W, CHAR_H);
            return;
        }

        const totalCols = Math.floor(img.width / CHAR_W);
        const col = foundIndex % totalCols;
        const row = Math.floor(foundIndex / totalCols);

        let sy = row * CHAR_H;
        
        const boldIndex = foundIndex + 16;
        if (boldIndex < (img.width / CHAR_W) * (img.height / CHAR_H)) {
            const boldCol = boldIndex % totalCols;
            const boldRow = Math.floor(boldIndex / totalCols);
            const sx = boldCol * CHAR_W;
            sy = boldRow * CHAR_H;
        }

        const sx = col * CHAR_W;
        ctx.drawImage(img, sx, sy, CHAR_W, CHAR_H, x, y, CHAR_W, CHAR_H);
    }

    // ============================================================
    // 5. ОТРИСОВКА ТЕКСТА НА КАНВАСЕ
    // ============================================================
    function renderTextOnCanvas(text, rowOffset) {
        const lines = text.split('\n');
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const row = rowOffset + i;
            if (row >= TERM_ROWS) break;
            for (let col = 0; col < line.length && col < TERM_COLS; col++) {
                const code = line.charCodeAt(col);
                if (code >= 0x20 && code <= 0x7E) {
                    drawChar(ctx, fontImage, code, col * CHAR_W, row * CHAR_H);
                }
            }
        }
    }

    // ============================================================
    // 6. НАСТРОЙКИ КАНВАСА
    // ============================================================
    const TERM_COLS = 80;
    const TERM_ROWS = 30;

    const canvas = document.getElementById('log');
    const ctx = canvas.getContext('2d');
    const screen = document.getElementById('screen');
    const logoContainer = document.getElementById('logoContainer');
    const logoImg = document.getElementById('logoImg');
    const tuxContainer = document.getElementById('tuxContainer');
    const videoContainer = document.getElementById('videoContainer');
    const bootVideo = document.getElementById('bootVideo');

    canvas.width = TERM_COLS * CHAR_W;
    canvas.height = TERM_ROWS * CHAR_H;

    canvas.style.position = 'absolute';
    canvas.style.top = '0';
    canvas.style.left = '0';

    // ============================================================
    // 7. АДАПТАЦИЯ ПОД МОБИЛКИ
    // ============================================================
    function fitCanvas() {
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        
        const canvasWidth = canvas.width;
        const canvasHeight = canvas.height;
        
        const scaleX = screenWidth / canvasWidth;
        const scaleY = screenHeight / canvasHeight;
        const scale = Math.min(scaleX, scaleY);
        
        canvas.style.transform = `scale(${scale})`;
        canvas.style.transformOrigin = 'top left';
        
        const offsetX = (screenWidth - canvasWidth * scale) / 2;
        const offsetY = (screenHeight - canvasHeight * scale) / 2;
        canvas.style.left = offsetX + 'px';
        canvas.style.top = offsetY + 'px';
    }

    // ============================================================
    // 8. СМЕНА ФОНА (БЫСТРАЯ)
    // ============================================================
    function flickerBackground(targetColor, steps = 2, delay = 30) {
        return new Promise((resolve) => {
            let step = 0;
            
            function doStep() {
                if (step < steps) {
                    if (step === 0) {
                        screen.style.background = targetColor;
                    } else if (step === 1) {
                        screen.style.background = `linear-gradient(to right, ${targetColor} 50%, #000000 50%)`;
                    } else if (step === 2) {
                        screen.style.background = targetColor;
                    }
                    step++;
                    setTimeout(doStep, delay);
                } else {
                    screen.style.background = targetColor;
                    resolve();
                }
            }
            doStep();
        });
    }

    // ============================================================
    // 9. ПОСТРОЧНЫЙ ВЫВОД
    // ============================================================
    let currentLine = 0;
    const lineDelay = 20;
    let isBootComplete = false;

    function renderNextLine() {
        if (currentLine >= logLines.length) {
            console.log('✅ Boot complete!');
            isBootComplete = true;
            return;
        }

        const line = logLines[currentLine];
        if (line) {
            for (let col = 0; col < line.length && col < TERM_COLS; col++) {
                const code = line.charCodeAt(col);
                if (code >= 0x20 && code <= 0x7E) {
                    drawChar(ctx, fontImage, code, col * CHAR_W, currentLine * CHAR_H);
                }
            }
        }
        currentLine++;

        if (currentLine < logLines.length) {
            setTimeout(renderNextLine, lineDelay);
        } else {
            isBootComplete = true;
        }
    }

    // ============================================================
    // 10. ОСНОВНАЯ ЛОГИКА ЗАГРУЗКИ
    // ============================================================
    let bootSequenceRunning = false;

    // Функция для загрузки изображения из кеша или с сервера
    function loadImageFromCache(name, imgElement) {
        const cached = localStorage.getItem(STORAGE_KEY);
        if (cached) {
            const cacheMap = JSON.parse(cached);
            if (cacheMap[name]) {
                imgElement.src = cacheMap[name].data;
                return true;
            }
        }
        // Если в кеше нет — используем оригинальный URL
        const resource = RESOURCES.find(r => r.name === name);
        if (resource) {
            imgElement.src = resource.url;
            return false;
        }
        return false;
    }

    async function startBootSequence() {
        if (bootSequenceRunning) return;
        bootSequenceRunning = true;
        isBootComplete = false;

        // --- ШАГ 0: Белый фон, предзагрузка ресурсов ---
        screen.style.background = '#ffffff';
        canvas.style.opacity = '0';
        logoContainer.classList.remove('show');
        logoContainer.classList.remove('big');
        videoContainer.classList.remove('show');
        videoContainer.classList.remove('big');
        tuxContainer.classList.remove('show');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Загружаем все ресурсы в localStorage (пока пользователь ничего не видит)
        await preloadResources();

        // Загружаем шрифт из кеша
        const fontUrl = getResourceUrl('12x22.png');
        if (fontUrl) {
            fontImage.src = fontUrl;
        } else {
            fontImage.src = '12x22.png';
        }

        // Ждём загрузки шрифта
        await new Promise((resolve) => {
            if (fontImage.complete && fontImage.naturalWidth > 0) {
                resolve();
            } else {
                fontImage.onload = resolve;
                fontImage.onerror = resolve;
            }
        });

        buildCharMap();
        fitCanvas();

        // --- ШАГ 1: Чёрный фон, ждём 0.5 секунды ---
        await flickerBackground('#000000', 3, 30);
        await new Promise(resolve => setTimeout(resolve, 500));

        // --- ШАГ 2: Показываем логотип biosimitation.png ---
        loadImageFromCache('biosimitation.png', logoImg);
        logoContainer.classList.add('show');

        // --- ШАГ 3: Выводим сообщение Recovery ---
        renderTextOnCanvas(recoveryMessage, 10);

        // --- ШАГ 4: Ждём 3 секунды ---
        await new Promise(resolve => setTimeout(resolve, 3000));

        // --- ШАГ 5: Быстрая смена на чёрный фон ---
        await flickerBackground('#000000', 3, 30);

        // --- ШАГ 6: Меняем лого на biosimitationpt2.png и показываем Tux ---
        loadImageFromCache('biosimitationpt2.png', logoImg);
        logoContainer.classList.add('show');
        loadImageFromCache('tux.png', document.querySelector('.tux img'));
        tuxContainer.classList.add('show');

        // --- ШАГ 7: Ждём 1 секунду ---
        await new Promise(resolve => setTimeout(resolve, 1000));

        // --- ШАГ 8: Убираем Tux и pt2, показываем vidboot_do_logov.jpg ---
        tuxContainer.classList.remove('show');
        loadImageFromCache('vidboot_do_logov.jpg', logoImg);
        logoContainer.classList.add('show');
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        currentLine = 0;
        canvas.style.opacity = '1';
        renderNextLine();

        // --- ШАГ 9: Ждём 4 секунды после завершения логов ---
        await new Promise(resolve => {
            const checkComplete = setInterval(() => {
                if (isBootComplete) {
                    clearInterval(checkComplete);
                    resolve();
                }
            }, 100);
        });

        // --- ШАГ 10: Мгновенно убираем логи и лого ---
        canvas.style.opacity = '0';
        logoContainer.classList.remove('show');

        // --- ШАГ 11: Показываем видео vidboot.mp4 ---
        const videoUrl = getResourceUrl('vidboot.mp4');
        if (videoUrl) {
            bootVideo.src = videoUrl;
        } else {
            bootVideo.src = 'logos/vidboot.mp4';
        }
        videoContainer.classList.add('show');
        bootVideo.currentTime = 0;
        bootVideo.play();

        // --- ШАГ 12: Чёрное моргание (0.01s) ---
        screen.style.background = '#000000';
        await new Promise(resolve => setTimeout(resolve, 10));
        screen.style.background = '#000000';
        
        bootSequenceRunning = false;
    }

    // ============================================================
    // 11. ЗАПУСК
    // ============================================================
    function start() {
        startBootSequence();
    }

    // Запускаем сразу, без ожидания загрузки шрифта (он загрузится в preload)
    start();

    // ============================================================
    // 12. ПЕРЕЗАПУСК ПО КЛИКУ
    // ============================================================
    document.addEventListener('click', function() {
        if (!bootSequenceRunning) {
            bootVideo.pause();
            bootVideo.currentTime = 0;
            videoContainer.classList.remove('show');
            startBootSequence();
        }
    });

    // ============================================================
    // 13. ПЕРЕСЧЁТ МАСШТАБА
    // ============================================================
    window.addEventListener('resize', fitCanvas);
    window.addEventListener('orientationchange', function() {
        setTimeout(fitCanvas, 300);
    });
</script>
</body>
</html>
