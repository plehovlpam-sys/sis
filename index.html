<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Font Grid Viewer</title>
    <style>
        * { margin: 0; padding: 0; background: #000; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #0f0;
            font-family: monospace;
        }
        canvas {
            border: 1px solid #333;
            image-rendering: pixelated;
            margin: 10px;
        }
        .info {
            padding: 10px;
            border: 1px solid #333;
            margin: 10px;
            max-width: 900px;
            background: #111;
        }
        .grid-info {
            display: grid;
            grid-template-columns: repeat(16, 60px);
            gap: 2px;
            margin: 10px;
            font-size: 10px;
        }
        .grid-info .cell {
            text-align: center;
            padding: 2px;
            border: 1px solid #222;
            background: #111;
        }
    </style>
</head>
<body>
    <div class="info" id="info">Loading font...</div>
    <canvas id="fontDisplay"></canvas>
    <div id="legend"></div>
    <canvas id="extractedChars" width="960" height="400"></canvas>

    <script>
        const fontImage = new Image();
        fontImage.src = '12x22.png';

        const CHAR_W = 12;
        const CHAR_H = 22;
        const COLS = 16;

        fontImage.onload = function() {
            const info = document.getElementById('info');
            info.innerHTML = `
                <b>✅ Font loaded: ${fontImage.width}×${fontImage.height}px</b><br>
                Ширина: ${fontImage.width}px (должно быть 1152 = 96×12)<br>
                Высота: ${fontImage.height}px (должно быть 44 = 2×22)<br>
                Всего символов: ${(fontImage.width / CHAR_W) * (fontImage.height / CHAR_H)}<br>
                Строк на картинке: ${Math.floor(fontImage.height / CHAR_H)}<br>
                Колонок на картинке: ${Math.floor(fontImage.width / CHAR_W)}
            `;

            // Показываем картинку
            const displayCanvas = document.getElementById('fontDisplay');
            displayCanvas.width = fontImage.width;
            displayCanvas.height = fontImage.height;
            const dctx = displayCanvas.getContext('2d');
            dctx.drawImage(fontImage, 0, 0);

            // Извлекаем все символы и показываем их с индексами
            const extractCanvas = document.getElementById('extractedChars');
            const ectx = extractCanvas.getContext('2d');
            ectx.fillStyle = '#000';
            ectx.fillRect(0, 0, extractCanvas.width, extractCanvas.height);

            const totalRows = Math.floor(fontImage.height / CHAR_H);
            const totalCols = Math.floor(fontImage.width / CHAR_W);

            let legendHtml = '<div class="grid-info">';
            let index = 0;

            for (let row = 0; row < totalRows; row++) {
                for (let col = 0; col < totalCols; col++) {
                    const sx = col * CHAR_W;
                    const sy = row * CHAR_H;
                    
                    // Выводим символ на холст
                    const tx = col * 60 + 10;
                    const ty = row * 80 + 10;
                    ectx.drawImage(fontImage, sx, sy, CHAR_W, CHAR_H, tx, ty, CHAR_W, CHAR_H);
                    
                    // Подписываем номер
                    ectx.fillStyle = '#666';
                    ectx.font = '8px monospace';
                    ectx.fillText(`#${index}`, tx + 14, ty + 32);
                    
                    legendHtml += `<div class="cell">#${index}</div>`;
                    index++;
                }
            }
            legendHtml += '</div>';
            document.getElementById('legend').innerHTML = legendHtml;

            // Дополнительная информация
            console.log('=== ПОЗИЦИИ БУКВ ===');
            console.log('Посчитайте от 0:');
            console.log('Ряд 0 (верхний): индексы 0-15');
            console.log('Ряд 1 (нижний): индексы 16-31');
            console.log('И т.д.');
            console.log('');
            console.log('Введите вручную индекс буквы "A" (посчитайте по картинке)');
        };

        fontImage.onerror = function() {
            document.getElementById('info').innerHTML = '❌ Не удалось загрузить 12x22.png!';
        };
    </script>
</body>
</html>
