<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle Bootstrap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #d9d4cd;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .kindle-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #e8e4db;
            overflow: hidden;
        }
        .logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            user-select: none;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        .logo img {
            display: block;
            max-width: 180px;
            height: auto;
        }
        .logo.hidden {
            opacity: 0;
        }
        #logCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div class="kindle-screen" id="screen">
    <div class="logo" id="logoContainer">
        <img src="logokindle.png" alt="Kindle" id="logoImg">
    </div>
    <canvas id="logCanvas"></canvas>
</div>

<script>
    (function() {
        const CHAR_W = 12;
        const CHAR_H = 22;
        const COLS_PER_ROW = 16;
        const TERM_COLS = 80;
        const TERM_ROWS = 30;

        const logLines = [
            '*****************************************',
            '*         WELCOME TO KINDLE              *',
            '*   Linux 3.0.35-lab126 #1 SMP PREEMPT  *',
            '*   KINDLE REV: 10th Generation          *',
            '*   SYSTEM: MAIN (User partition)        *',
            '*   BATTERY: 98% (Charging)              *',
            '*   STORAGE: 2.1 GB free of 3.2 GB       *',
            '*****************************************',
            '',
            '[    0.000000] Booting Linux on physical CPU 0x0',
            '[    0.000000] Linux version 3.0.35-lab126 (lab126@sw027) (gcc version 4.5.1)',
            '[    0.000000] CPU: ARMv7 Processor [412fc09a] revision 10 (ARMv7)',
            '[    0.000000] Memory: 512MB = 512MB total',
            '[    0.390000] EXT3-fs (mmcblk0p1): mounted filesystem with writeback data mode',
            '[    4.230000] EPDC: 1st update marker - pre-initialization flash',
            '[    5.450000] input: framework_keypad as /devices/virtual/input/input0',
            '[    6.520000] Battery: 4.172 Volts, 31 Degrees C, Charging',
            '[    7.100000] wifi: firmware loaded successfully, link is UP',
            '[    8.000000] *** System ready ***',
            '',
            'Kindle startup complete. Happy reading!',
            '',
            'login[1890]: root login on \'ttyS0\''
        ];

        const canvas = document.getElementById('logCanvas');
        const ctx = canvas.getContext('2d');
        const logoContainer = document.getElementById('logoContainer');

        const fontImage = new Image();
        fontImage.src = '12x22.png';

        let currentLine = 0;
        let lineDelay = 30;

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        function drawChar(img, code, x, y, useBold) {
            if (code < 0x20 || code > 0x7E) return;
            const index = code - 0x20;
            if (index < 0 || index >= 96) return;

            const col = index % COLS_PER_ROW;
            const row = useBold ? 1 : 0;

            const sx = col * CHAR_W;
            const sy = row * CHAR_H;

            ctx.drawImage(
                img,
                sx, sy, CHAR_W, CHAR_H,
                x, y, CHAR_W, CHAR_H
            );
        }

        function renderLine(line, rowIndex) {
            if (!line) return;
            const yPos = rowIndex * CHAR_H;
            for (let col = 0; col < line.length && col < TERM_COLS; col++) {
                const code = line.charCodeAt(col);
                if (code >= 0x20 && code <= 0x7E) {
                    const bold = (code !== 0x20);
                    drawChar(fontImage, code, col * CHAR_W, yPos, bold);
                }
            }
        }

        function renderAllLines() {
            // Очищаем только область с текстом (оставляем фон E Ink)
            // Но canvas прозрачный, поэтому просто ничего не делаем с фоном
            
            // Рисуем все строки до currentLine
            for (let row = 0; row <= currentLine && row < logLines.length && row < TERM_ROWS; row++) {
                const line = logLines[row];
                renderLine(line, row);
            }
        }

        function renderNextLine() {
            if (currentLine >= logLines.length) {
                console.log('✅ Boot complete!');
                return;
            }

            const line = logLines[currentLine];
            renderLine(line, currentLine);
            currentLine++;

            if (currentLine < logLines.length) {
                setTimeout(renderNextLine, lineDelay);
            } else {
                // Логотип исчезает, когда лог почти дописан
                logoContainer.classList.add('hidden');
            }
        }

        function startBoot() {
            resizeCanvas();

            // Ждём загрузки шрифта
            if (!fontImage.complete || fontImage.naturalWidth === 0) {
                fontImage.onload = function() {
                    startRendering();
                };
                return;
            }
            startRendering();
        }

        function startRendering() {
            // Лого видно, начинаем печатать
            logoContainer.classList.remove('hidden');
            currentLine = 0;
            // Очищаем canvas (прозрачный фон)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            renderNextLine();
        }

        // Изменение размера окна
        window.addEventListener('resize', resizeCanvas);

        // Запуск
        fontImage.onload = function() {
            startBoot();
        };

        fontImage.onerror = function() {
            console.error('❌ 12x22.png не найден!');
            // Показываем ошибку прямо на экране
            ctx.fillStyle = '#000';
            ctx.font = '14px monospace';
            ctx.fillText('ERROR: 12x22.png not found!', 10, 30);
        };

        // Если картинка уже загружена
        if (fontImage.complete && fontImage.naturalWidth > 0) {
            startBoot();
        }

        // Повторный запуск при клике (для удобства)
        document.addEventListener('click', function() {
            if (currentLine >= logLines.length) {
                startRendering();
            }
        });
    })();
</script>
</body>
</html>
